<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OOO ARCHIVE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <script type="importmap">
  {
    "imports": {
      "three": "https://esm.sh/three@0.165.0",
      "three/addons/": "https://esm.sh/three@0.165.0/examples/jsm/",
      "gsap": "https://esm.sh/gsap@3.12.5"
    }
  }
  </script>
  <style>
    /* ── 배경 성운 유영 키프레임 ── */
    @keyframes nebulaDrift {
      0%   { background-position: 20% 44%; }
      20%  { background-position: 38% 52%; }
      40%  { background-position: 58% 47%; }
      60%  { background-position: 72% 54%; }
      80%  { background-position: 48% 50%; }
      100% { background-position: 20% 44%; }
    }
    @keyframes nebulaBreath {
      0%, 100% { background-size: 220% auto; }
      50%       { background-size: 230% auto; }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060504;
      --logic: #7EA4C8;
      --rest: #C8A87E;
      --shadows: #B87EA8;
      --study: #9AAA88;
      --t1: rgba(255,255,255,0.92);
      --t2: rgba(255,255,255,0.68);
      --t3: rgba(255,255,255,0.42);
      --line: rgba(255,255,255,0.10);
    }

    body {
      background: var(--bg);
      color: var(--t1);
      font-family: 'DM Mono', 'Malgun Gothic', monospace;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      user-select: none;
    }

    /* ── TOPBAR ── */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      background: rgba(6,5,4,0.88);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
      z-index: 100;
    }
    #topbar-title {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.22em;
      color: var(--t2);
    }
    #topbar-status {
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--t3);
    }

    /* ── CANVAS ── */
    #canvas-wrap {
      position: fixed;
      top: 42px; left: 180px; right: 220px;
      bottom: 72px;
      cursor: grab;
      /* 배경 이미지 */
      background-image: url('./bg.jpg');
      background-size: 220% auto;
      background-position: 20% 50%;
      background-repeat: no-repeat;
      animation: nebulaDrift 80s ease-in-out infinite,
                 nebulaBreath 25s ease-in-out infinite;
      will-change: background-position;
    }
    #canvas-wrap:active { cursor: grabbing; }
    #canvas-wrap canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      /* WebGL 캔버스를 투명하게 유지 */
      background: transparent !important;
    }

    /* ── 실내 사진 배경 ── */
    #room-bg {
      position: absolute;
      inset: 0;
      z-index: 5;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.7s ease;
    }
    #room-bg.visible { opacity: 1; }
    #room-bg img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    /* 실내 사진 위 그라데이션: 칩 가독성 */
    #room-bg::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(6,5,4,0.18) 0%,
        rgba(6,5,4,0.0)  40%,
        rgba(6,5,4,0.32) 100%
      );
    }
    /* 실내 뷰일 때 칩 z-index 를 room-bg 위로 */
    #chips-layer.interior { z-index: 40; }

    /* ── LEFT PANEL ── */
    #left-panel {
      position: fixed;
      top: 42px; left: 0;
      width: 180px;
      bottom: 72px;
      background: rgba(6,5,4,0.92);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      z-index: 50;
    }
    #node-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }
    #node-list::-webkit-scrollbar { width: 2px; }
    #node-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); }

    .node-section { padding: 12px 10px 4px; }
    .node-section-label {
      font-size: 8px;
      letter-spacing: 0.25em;
      color: var(--t3);
      text-transform: uppercase;
      margin-bottom: 6px;
      padding-left: 2px;
    }
    .node-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 8px;
      margin-bottom: 1px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 10px;
      line-height: 1.35;
      color: var(--t2);
      transition: background 0.15s, color 0.15s;
      border-left: 2px solid transparent;
      position: relative;
    }
    .node-item:hover { color: var(--t1); background: rgba(255,255,255,0.04); }
    .node-item.active { color: var(--t1); background: rgba(255,255,255,0.05); }
    .node-item.visited::after {
      content: '';
      position: absolute;
      right: 8px; top: 50%;
      transform: translateY(-50%);
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--t3);
    }
    .node-item[data-mod="logic"]   { border-left-color: var(--logic); }
    .node-item[data-mod="rest"]    { border-left-color: var(--rest); }
    .node-item[data-mod="shadows"] { border-left-color: var(--shadows); }
    .node-item.dimmed {
      opacity: 0.15;
      transition: opacity 0.35s ease;
    }

    .node-dot {
      flex-shrink: 0;
      width: 5px; height: 5px;
      border-radius: 50%;
    }
    .node-text { line-height: 1.3; }

    /* explore counter */
    #explore-counter {
      flex-shrink: 0;
      padding: 10px 12px 12px;
      border-top: 1px solid var(--line);
    }
    #counter-label {
      font-size: 8px;
      color: var(--t3);
      letter-spacing: 0.12em;
      margin-bottom: 5px;
    }
    #counter-bar {
      height: 1px;
      background: rgba(255,255,255,0.07);
      border-radius: 1px;
      overflow: hidden;
    }
    #counter-fill {
      height: 100%;
      background: rgba(200,175,120,0.85);
      width: 0%;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }

    /* ── RIGHT PANEL ── */
    #right-panel {
      position: fixed;
      top: 42px; right: 0;
      width: 220px;
      bottom: 72px;
      background: rgba(6,5,4,0.92);
      border-left: 1px solid var(--line);
      overflow-y: auto;
      z-index: 50;
      transform: translateX(0);
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    #right-panel.hidden { transform: translateX(220px); }
    #right-panel::-webkit-scrollbar { width: 2px; }
    #right-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); }

    #panel-inner { padding: 18px 14px; }
    #panel-close {
      float: right;
      font-size: 9px;
      color: var(--t3);
      cursor: pointer;
      letter-spacing: 0.1em;
      margin-top: -2px;
      background: none;
      border: none;
      color: var(--t3);
      font-family: inherit;
    }
    #panel-close:hover { color: var(--t2); }
    #panel-mod {
      font-size: 8px;
      letter-spacing: 0.25em;
      color: var(--t3);
      text-transform: uppercase;
      margin-bottom: 10px;
      clear: both;
    }
    #panel-title {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 15px;
      line-height: 1.35;
      color: var(--t1);
      margin-bottom: 12px;
    }
    #panel-body {
      font-size: 10.5px;
      line-height: 1.75;
      color: var(--t2);
      margin-bottom: 14px;
    }
    #panel-meta { margin-bottom: 14px; }
    .meta-row {
      display: flex;
      justify-content: space-between;
      font-size: 8.5px;
      color: var(--t3);
      margin-bottom: 3px;
      letter-spacing: 0.05em;
    }
    .meta-key { opacity: 0.7; }

    #panel-rel-wrap { margin-bottom: 14px; }
    .rel-label {
      font-size: 8px;
      letter-spacing: 0.18em;
      color: var(--t3);
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .rel-item {
      font-size: 9.5px;
      color: var(--t2);
      padding: 4px 0;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: color 0.15s;
    }
    .rel-item:hover { color: var(--t1); }
    .rel-arrow { opacity: 0.3; margin-right: 5px; }

    #panel-divider {
      height: 1px;
      background: var(--line);
      margin: 12px 0;
    }
    #panel-mirror {
      font-size: 10.5px;
      line-height: 1.85;
      color: rgba(255,255,255,0.32);
      font-style: italic;
    }

    /* ── BOTTOM NAV ── */
    #bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 46px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 4px;
      background: rgba(6,5,4,0.92);
      border-top: 1px solid var(--line);
      z-index: 100;
    }
    .nav-btn {
      padding: 5px 13px;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--t3);
      background: none;
      border: 1px solid transparent;
      border-radius: 2px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      text-transform: uppercase;
    }
    .nav-btn:hover { color: var(--t2); border-color: rgba(255,255,255,0.08); }
    .nav-btn.active {
      color: var(--t1);
      border-color: rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.04);
    }

    /* ── 밝기 슬라이더 ── */
    #brightness-ctrl {
      display: none;
      position: fixed;
      bottom: 56px;
      right: 16px;
      background: rgba(8,5,16,0.88);
      border: 1px solid rgba(184,126,168,0.25);
      border-radius: 6px;
      padding: 10px 14px;
      z-index: 110;
      backdrop-filter: blur(8px);
      gap: 8px;
      align-items: center;
      flex-direction: column;
      min-width: 140px;
    }
    #brightness-ctrl.visible { display: flex; }
    #brightness-ctrl label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      color: var(--shadows);
      text-transform: uppercase;
      white-space: nowrap;
    }
    #brightness-slider {
      -webkit-appearance: none;
      width: 100%;
      height: 2px;
      background: rgba(184,126,168,0.3);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    #brightness-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--shadows);
      cursor: pointer;
      box-shadow: 0 0 6px rgba(184,126,168,0.6);
    }
    #brightness-val {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.08em;
    }

    /* ── DWELL BAR ── */
    #dwell-bar {
      position: fixed;
      bottom: 46px;
      left: 180px; right: 220px;
      height: 26px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      background: rgba(6,5,4,0.75);
      border-top: 1px solid rgba(255,255,255,0.03);
      z-index: 90;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
    }
    #dwell-bar.active { opacity: 1; }
    #dwell-name { font-size: 8.5px; color: var(--t2); white-space: nowrap; min-width: 80px; }
    #dwell-progress {
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.07);
      border-radius: 1px;
      overflow: hidden;
    }
    #dwell-fill {
      height: 100%;
      width: 0%;
      background: rgba(200,175,120,0.85);
    }
    #dwell-time { font-size: 8px; color: var(--t3); min-width: 30px; text-align: right; }

    /* ── SVG CONNECTIONS OVERLAY ── */
    #connections-overlay {
      position: fixed;
      top: 42px; left: 180px; right: 220px;
      bottom: 72px;
      pointer-events: none;  /* SVG 배경은 통과, g 요소만 이벤트 받음 */
      z-index: 30;
      overflow: visible;
    }
    #connections-overlay g {
      pointer-events: all;   /* 노드 점은 클릭 가능 */
    }

    /* ── 3D CHIPS ── */
    #chips-layer {
      position: fixed;
      top: 42px; left: 180px; right: 220px;
      bottom: 72px;
      pointer-events: none;
      z-index: 35;
    }
    .node-chip {
      position: absolute;
      transform: translate(-50%, -50%);
      padding: 3px 9px;
      border: 1px solid currentColor;
      border-radius: 2px;
      font-size: 10px;
      letter-spacing: 0.10em;
      cursor: pointer;
      white-space: nowrap;
      background: rgba(6,5,4,0.78);
      backdrop-filter: blur(6px);
      pointer-events: all;
      transition: background 0.2s, transform 0.2s;
      opacity: 0.92;
    }
    .node-chip:hover { background: rgba(6,5,4,0.95); transform: translate(-50%, -50%) scale(1.05); opacity: 1; }

    /* ── SPACE CHIPS (interior) ── */
    .space-chip {
      position: absolute;
      transform: translate(-50%, -50%);
      padding: 2px 7px;
      border: 1px solid currentColor;
      border-radius: 2px;
      font-size: 8px;
      letter-spacing: 0.12em;
      cursor: pointer;
      white-space: nowrap;
      background: rgba(6,5,4,0.65);
      backdrop-filter: blur(4px);
      pointer-events: all;
      transition: background 0.2s;
    }
    .space-chip:hover { background: rgba(6,5,4,0.88); }

    /* ── EDIT TOGGLE BUTTON ── */
    #edit-toggle {
      padding: 5px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--rest);
      background: rgba(200,168,126,0.10);
      border: 1px solid rgba(200,168,126,0.4);
      border-radius: 2px;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    #edit-toggle:hover { background: rgba(200,168,126,0.18); }
    #edit-toggle.active {
      color: #0a0908;
      background: var(--rest);
      border-color: var(--rest);
    }

    /* ── PANEL TOP BAR ── */
    #panel-top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    #panel-save-btn {
      padding: 4px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #0a0908;
      background: var(--rest);
      border: none;
      border-radius: 2px;
      cursor: pointer;
      transition: background 0.15s;
    }
    #panel-save-btn:hover { background: #d4b48a; }

    /* ── 편집 모드 필드 ── */
    .edit-field { margin-bottom: 12px; }
    .edit-label {
      display: block;
      font-size: 8px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 5px;
    }
    .edit-input,
    .edit-textarea {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      color: rgba(255,255,255,0.88);
      padding: 7px 9px;
      font-family: 'DM Mono', 'Malgun Gothic', monospace;
      font-size: 11px;
      border-radius: 2px;
      outline: none;
      transition: border-color 0.15s;
    }
    .edit-input:focus,
    .edit-textarea:focus { border-color: rgba(255,255,255,0.25); }
    .edit-textarea { resize: vertical; min-height: 70px; line-height: 1.6; }
    .edit-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .edit-img-row { display: flex; gap: 6px; margin-bottom: 5px; align-items: center; }
    .edit-img-row .edit-input { flex: 1; }
    .edit-img-del {
      background: none;
      border: 1px solid rgba(200,126,126,0.3);
      color: #c87e7e;
      cursor: pointer;
      padding: 5px 8px;
      font-size: 9px;
      border-radius: 2px;
      font-family: inherit;
      flex-shrink: 0;
    }
    .edit-add-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--t3);
      cursor: pointer;
      padding: 4px 10px;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      border-radius: 2px;
      letter-spacing: 0.1em;
      margin-top: 2px;
    }
    .edit-add-btn:hover { color: var(--t2); }
    .edit-divider {
      border: none;
      border-top: 1px solid var(--line);
      margin: 14px 0;
    }

    /* ── 패널 이미지 갤러리 ── */
    .panel-gallery {
      margin: 14px 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .panel-gallery-img {
      width: 100%;
      display: block;
      border-radius: 2px;
      object-fit: cover;
      max-height: 180px;
      border: 1px solid rgba(255,255,255,0.06);
      cursor: zoom-in;
      transition: max-height 0.35s ease, border-color 0.2s;
    }
    .panel-gallery-img.expanded {
      max-height: 600px;
      cursor: zoom-out;
      border-color: rgba(255,255,255,0.15);
    }

    /* ── 패널 링크 ── */
    .panel-links {
      margin: 12px 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .panel-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 2px;
      color: rgba(255,255,255,0.65);
      text-decoration: none;
      font-size: 10px;
      letter-spacing: 0.08em;
      font-family: 'DM Mono', 'Malgun Gothic', monospace;
      background: rgba(255,255,255,0.02);
      cursor: pointer;
      width: 100%;
      text-align: left;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .panel-link:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.88);
    }
    .panel-link-arrow {
      font-size: 11px;
      opacity: 0.5;
      flex-shrink: 0;
    }
    /* 링크 행 (링크버튼 + ♫ 버튼 묶음) */
    .panel-link-row {
      display: flex; gap: 5px; align-items: stretch;
    }
    .panel-link-row .panel-link {
      flex: 1;
    }
    /* ♫ 배경재생 버튼 */
    .panel-link-music {
      flex-shrink: 0;
      padding: 0 10px;
      background: none;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 2px;
      color: var(--rest);
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s, border-color 0.2s;
    }
    .panel-link-music:hover {
      background: rgba(200,168,126,0.08);
      border-color: rgba(200,168,126,0.3);
    }

    /* ── 미니 뮤직 플레이어 ── */
    #music-player {
      position: fixed;
      left: 190px; bottom: 82px;
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px;
      background: rgba(6,5,4,0.92);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(200,168,126,0.2);
      border-radius: 3px;
      z-index: 90;
      font-size: 10px; letter-spacing: 0.08em;
      color: rgba(255,255,255,0.65);
      max-width: 340px;
      opacity: 0; transform: translateY(8px);
      pointer-events: none;
      transition: opacity 0.35s ease, transform 0.38s cubic-bezier(0.22,1,0.36,1);
    }
    #music-player.visible {
      opacity: 1; transform: translateY(0);
      pointer-events: all;
    }
    #mp-icon { color: var(--rest); font-size: 11px; flex-shrink: 0; }
    #mp-title {
      flex: 1; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: rgba(255,255,255,0.72);
    }
    #mp-toggle, #mp-stop {
      flex-shrink: 0;
      background: none; border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.5); border-radius: 2px;
      width: 26px; height: 26px; font-size: 10px;
      cursor: pointer; font-family: inherit;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    #mp-toggle:hover, #mp-stop:hover {
      color: #fff; border-color: rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.05);
    }

    /* ── 편집 모드 링크 행 ── */
    .edit-link-row {
      display: grid;

  <!-- ── 거울 반짝임 파티클 ── -->
  <script>
    (function () {
      var canvas, ctx, raf, particles = [];
      var COLORS = ['#ffffff','#ffffff','#D8EAFF','#EAD8FF','#FFE8D8','#D8FFE8'];

      function cw() { return canvas ? canvas.width  : window.innerWidth;  }
      function ch() { return canvas ? canvas.height : window.innerHeight; }

      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      function rand(a, b) { return a + Math.random() * (b - a); }

      function makeP() {
        var r = Math.random();
        /* 대형 오로라 광구 (5%) */
        if (r > 0.95) return {
          type:'orb', x:rand(0,cw()), y:rand(0,ch()),
          size: rand(100,200),
          phase: rand(0,6.28), speed: rand(0.08,0.18),
          hue: Math.random()>0.5 ? '180,210,255' : '160,140,240',
          drift: rand(-0.25,0.25), vy: -rand(0.03,0.08),
        };
        /* 중형 8점 별빛 (15%) */
        if (r > 0.80) return {
          type:'star', x:rand(0,cw()), y:rand(0,ch()),
          size: rand(5,14),
          phase: rand(0,6.28), speed: rand(0.7,1.8),
          max: rand(0.5,0.95),
          drift: rand(-0.12,0.12), vy: -rand(0.06,0.18),
          col: COLORS[Math.floor(Math.random()*COLORS.length)],
        };
        /* 소형 점 (80%) */
        return {
          type:'dot', x:rand(0,cw()), y:rand(0,ch()),
          size: rand(0.4,2.0),
          phase: rand(0,6.28), speed: rand(0.25,0.8),
          max: rand(0.15,0.9),
          drift: rand(-0.2,0.2), vy: -rand(0.03,0.16),
          col: COLORS[Math.floor(Math.random()*COLORS.length)],
        };
      }

      function wrap(p) {
        var W = cw(), H = ch();
        var pad = (p.type==='orb') ? p.size : 12;
        if (p.y < -pad) { p.y = H + pad; p.x = rand(0, W); }
        if (p.x < -pad) p.x = W + pad;
        if (p.x > W+pad) p.x = -pad;
      }

      function draw(t) {
        if (!canvas) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        var ts = t / 1000;

        /* 광구 (맨 뒤) */
        particles.forEach(function(p) {
          if (p.type !== 'orb') return;
          p.x += p.drift; p.y += p.vy; wrap(p);
          var op = ((Math.sin(ts*p.speed+p.phase)+1)/2) * 0.10;
          var g = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size);
          g.addColorStop(0, 'rgba('+p.hue+','+op.toFixed(3)+')');
          g.addColorStop(1, 'rgba('+p.hue+',0)');
          ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,6.283);
          ctx.fillStyle = g; ctx.fill();
        });

        /* 점 */
        particles.forEach(function(p) {
          if (p.type !== 'dot') return;
          p.x += p.drift; p.y += p.vy; wrap(p);
          var op = ((Math.sin(ts*p.speed+p.phase)+1)/2) * p.max;
          ctx.save();
          ctx.globalAlpha = op;
          ctx.shadowBlur   = p.size * 4;
          ctx.shadowColor  = p.col;
          ctx.fillStyle    = p.col;
          ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,6.283); ctx.fill();
          ctx.restore();
        });

        /* 별빛 (맨 앞) */
        particles.forEach(function(p) {
          if (p.type !== 'star') return;
          p.x += p.drift; p.y += p.vy; wrap(p);
          var op = ((Math.sin(ts*p.speed+p.phase)+1)/2) * p.max;
          var sz = p.size;
          ctx.save();
          ctx.globalAlpha = op;
          ctx.strokeStyle = p.col;
          ctx.lineWidth   = 1.0;
          ctx.shadowBlur  = sz * 3;
          ctx.shadowColor = p.col;
          /* 십자 + 대각 (8방향) */
          ctx.beginPath();
          ctx.moveTo(p.x-sz,p.y); ctx.lineTo(p.x+sz,p.y);
          ctx.moveTo(p.x,p.y-sz); ctx.lineTo(p.x,p.y+sz);
          ctx.moveTo(p.x-sz*.55,p.y-sz*.55); ctx.lineTo(p.x+sz*.55,p.y+sz*.55);
          ctx.moveTo(p.x+sz*.55,p.y-sz*.55); ctx.lineTo(p.x-sz*.55,p.y+sz*.55);
          ctx.stroke();
          /* 중심 점 */
          ctx.globalAlpha = op * 0.9;
          ctx.fillStyle = '#fff';
          ctx.beginPath(); ctx.arc(p.x,p.y,sz*.22,0,6.283); ctx.fill();
          ctx.restore();
        });

        raf = requestAnimationFrame(draw);
      }

      window.startMirrorSparkle = function () {
        canvas = document.getElementById('mirror-sparkle-canvas');
        if (!canvas) return;
        ctx = canvas.getContext('2d');
        resize();
        /* 160 점 + 40 별 + 12 광구 = 212개 */
        particles = [];
        for (var i=0;i<212;i++) particles.push(makeP());
        if (raf) cancelAnimationFrame(raf);
        raf = requestAnimationFrame(draw);
      };

      window.stopMirrorSparkle = function () {
        if (raf) { cancelAnimationFrame(raf); raf = null; }
        if (ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
      };

      window.addEventListener('resize', function () { if (canvas) resize(); });
    })();
  </script>

  <!-- ── 뮤직 플레이어 (YouTube + 로컬 오디오 통합) ── -->
  <script>
    (function () {
      /* ── 공통 상태 ── */
      var _playing  = false;
      var _mode     = 'none';  // 'yt' | 'local' | 'none'

      /* ── YouTube 플레이어 ── */
      var _ytPlayer = null;
      var _ytReady  = false;
      var _pending  = null;   // { id, label } — YT 준비 전 요청 대기

      /* YouTube IFrame API 비동기 로드 */
      var tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);

      window.onYouTubeIframeAPIReady = function () {
        _ytReady = true;
        _ytPlayer = new YT.Player('yt-bg-player', {
          videoId: '',
          playerVars: { autoplay: 0, controls: 0, playsinline: 1 },
          events: {
            onReady: function () {
              if (_pending) { _doPlayYt(_pending.id, _pending.label); _pending = null; }
            },
            onStateChange: function (e) {
              if (_mode !== 'yt') return;
              _playing = (e.data === YT.PlayerState.PLAYING);
              document.getElementById('mp-toggle').textContent = _playing ? '⏸' : '▶';
            },
          },
        });
      };

      function _getYtId(url) {
        var m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?(?:.*&)?v=|embed\/|v\/))([a-zA-Z0-9_-]{11})/);
        return m ? m[1] : null;
      }

      /* ── 로컬 오디오 판별 ── */
      function _isLocalAudio(url) {
        if (!url) return false;
        if (url.startsWith('data:audio')) return true;
        var ext = url.split('?')[0].toLowerCase();
        return /\.(mp3|wav|ogg|flac|m4a|aac|webm)$/.test(ext);
      }

      /* ── 플레이어 표시 헬퍼 ── */
      function _showPlayer(displayText) {
        document.getElementById('mp-title').textContent = displayText;
        document.getElementById('music-player').classList.add('visible');
        document.getElementById('mp-toggle').textContent = '⏸';
        _playing = true;
      }

      /* ── YouTube 재생 ── */
      function _doPlayYt(id, displayText) {
        // 로컬 오디오 멈추기
        var la = document.getElementById('local-audio');
        la.pause(); la.src = '';

        _mode = 'yt';
        _showPlayer(displayText);
        _ytPlayer.loadVideoById(id);
      }

      /* ── 로컬 오디오 재생 ── */
      function _doPlayLocal(url, displayText) {
        // YouTube 멈추기
        if (_ytPlayer && typeof _ytPlayer.stopVideo === 'function') {
          try { _ytPlayer.stopVideo(); } catch(e) {}
        }

        var la = document.getElementById('local-audio');
        la.src = url;
        la.volume = 0.85;
        la.play().catch(function(e) {
          console.warn('[LocalAudio] 재생 실패:', e.message);
        });

        la.onplay  = function() { _playing = true;  document.getElementById('mp-toggle').textContent = '⏸'; };
        la.onpause = function() { _playing = false; document.getElementById('mp-toggle').textContent = '▶'; };
        la.onended = function() { _playing = false; document.getElementById('mp-toggle').textContent = '▶'; };

        _mode = 'local';
        _showPlayer(displayText);
      }

      /* ── 외부 호출: playMusic(url, songLabel, nodeText) ──
         미니 플레이어에는 nodeText(어느 노드의 곡인지)를 표시 */
      window.playMusic = function (url, label, nodeText) {
        var displayText = nodeText || label;

        if (_isLocalAudio(url)) {
          _doPlayLocal(url, displayText);
          return;
        }

        var id = _getYtId(url);
        if (!id) return;

        if (_ytReady && _ytPlayer && typeof _ytPlayer.loadVideoById === 'function') {
          _doPlayYt(id, displayText);
        } else {
          _pending = { id: id, label: displayText };
        }
      };

      /* ── 버튼 이벤트 ── */
      document.addEventListener('DOMContentLoaded', function () {
        /* 일시정지 / 재생 토글 */
        document.getElementById('mp-toggle').addEventListener('click', function () {
          if (_mode === 'yt' && _ytPlayer) {
            if (_playing) _ytPlayer.pauseVideo();
            else          _ytPlayer.playVideo();
          } else if (_mode === 'local') {
            var la = document.getElementById('local-audio');
            if (_playing) la.pause();
            else          la.play();
          }
        });

        /* 정지 + 플레이어 숨김 */
        document.getElementById('mp-stop').addEventListener('click', function () {
          if (_mode === 'yt' && _ytPlayer) {
            try { _ytPlayer.stopVideo(); } catch(e) {}
          } else if (_mode === 'local') {
            var la = document.getElementById('local-audio');
            la.pause(); la.src = '';
          }
          _mode = 'none'; _playing = false;
          document.getElementById('music-player').classList.remove('visible');
          document.getElementById('mp-toggle').textContent = '⏸';
        });
      });
    })();
  </script>

  <!-- ── 미디어 뷰어 JS ── -->
  <script>
    (function () {
      const $ = id => document.getElementById(id);
      let _imgs = [], _idx = 0, _mode = 'image';

      /* ── YouTube ID 추출 ── */
      function getYtId(url) {
        const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?(?:.*&)?v=|embed\/|v\/))([a-zA-Z0-9_-]{11})/);
        return m ? m[1] : null;
      }

      /* ── 열기 공통 ── */
      function _open() {
        $('media-viewer').classList.add('open');
      }
      function _close() {
        $('media-viewer').classList.remove('open');
        setTimeout(() => {
          $('mv-yt').src  = '';
          $('mv-img').src = '';
          $('mv-web').src = '';
          $('mv-web-blocked').style.display = 'none';
          $('mv-web').style.display = '';
        }, 400);
      }

      /* ── 각 모드별 패널 전환 헬퍼 ── */
      function _switchMode(mode) {
        $('mv-img-wrap').style.display  = mode === 'image'   ? 'flex'  : 'none';
        $('mv-yt-wrap').style.display   = mode === 'youtube' ? 'block' : 'none';
        $('mv-web-wrap').style.display  = mode === 'web'     ? 'flex'  : 'none';
        $('mv-counter').style.display   = mode === 'image'   ? ''      : 'none';
        _mode = mode;
      }

      /* ── 이미지 로드 ── */
      function _loadImg(idx) {
        _idx = Math.max(0, Math.min(idx, _imgs.length - 1));
        const img = $('mv-img');
        img.classList.add('mv-fade');
        setTimeout(() => {
          img.src = _imgs[_idx];
          img.onload = img.onerror = () => img.classList.remove('mv-fade');
        }, 180);
        $('mv-counter').textContent = _imgs.length > 1 ? `${_idx + 1}  /  ${_imgs.length}` : '';
        $('mv-prev').classList.toggle('hidden', _idx === 0);
        $('mv-next').classList.toggle('hidden', _idx === _imgs.length - 1);
      }

      /* ── 이미지 열기 (외부 호출) ── */
      window.openMedia = function (images, startIdx) {
        _imgs = images;
        _switchMode('image');
        _loadImg(startIdx || 0);
        _open();
      };
      /* 구버전 호환 */
      window.openLightbox = (imgs, idx) => window.openMedia(imgs, idx);

      /* ── YouTube 열기 (외부 호출) ── */
      window.openYoutube = function (url) {
        const id = getYtId(url);
        if (!id) { window.open(url, '_blank'); return; }
        _switchMode('youtube');
        $('mv-yt').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
        _open();
      };

      /* ── 웹 미리보기 열기 (외부 호출) ── */
      window.openWebPreview = function (url) {
        _switchMode('web');
        $('mv-web-url').textContent = url;
        $('mv-web-newtab').href  = url;
        $('mv-web-fallback').href = url;
        $('mv-web-blocked').style.display = 'none';
        $('mv-web').style.display = '';
        $('mv-web').src = url;
        _open();

        /* X-Frame-Options 차단 감지: load 이벤트 발생 안 하면 fallback 표시 */
        const timeoutId = setTimeout(() => {
          /* iframe이 로드됐는지 확인 불가이므로 4초 후에도 별 이상 없으면 그냥 두고,
             실제 차단은 onerror나 security error로만 잡을 수 있음 */
        }, 4000);
        $('mv-web').onerror = () => {
          clearTimeout(timeoutId);
          $('mv-web').style.display = 'none';
          $('mv-web-blocked').style.display = 'flex';
        };
      };

      /* ── 이벤트 ── */
      document.addEventListener('DOMContentLoaded', () => {
        $('mv-close').addEventListener('click', _close);
        $('mv-prev').addEventListener('click', () => _loadImg(_idx - 1));
        $('mv-next').addEventListener('click', () => _loadImg(_idx + 1));
        document.addEventListener('keydown', e => {
          if (!$('media-viewer').classList.contains('open')) return;
          if (e.key === 'Escape')     _close();
          if (e.key === 'ArrowLeft')  _loadImg(_idx - 1);
          if (e.key === 'ArrowRight') _loadImg(_idx + 1);
        });
      });
    })();
  </script>
