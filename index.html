<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KIM SUNBEOM ARCHIVE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <script type="importmap">
  {
    "imports": {
      "three": "https://esm.sh/three@0.165.0",
      "gsap": "https://esm.sh/gsap@3.12.5"
    }
  }
  </script>
  <style>
    /* ── 배경 성운 유영 키프레임 ── */
    @keyframes nebulaDrift {
      0%   { background-position: 20% 44%; }
      20%  { background-position: 38% 52%; }
      40%  { background-position: 58% 47%; }
      60%  { background-position: 72% 54%; }
      80%  { background-position: 48% 50%; }
      100% { background-position: 20% 44%; }
    }
    @keyframes nebulaBreath {
      0%, 100% { background-size: 220% auto; }
      50%       { background-size: 230% auto; }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060504;
      --logic: #7EA4C8;
      --rest: #C8A87E;
      --shadows: #B87EA8;
      --study: #9AAA88;
      --t1: rgba(255,255,255,0.92);
      --t2: rgba(255,255,255,0.68);
      --t3: rgba(255,255,255,0.42);
      --line: rgba(255,255,255,0.10);
    }

    body {
      background: var(--bg);
      color: var(--t1);
      font-family: 'DM Mono', 'Malgun Gothic', monospace;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      user-select: none;
    }

    /* ── TOPBAR ── */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      background: rgba(6,5,4,0.88);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
      z-index: 100;
    }
    #topbar-title {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.22em;
      color: var(--t2);
    }
    #topbar-status {
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--t3);
    }

    /* ── CANVAS ── */
    #canvas-wrap {
      position: fixed;
      top: 42px; left: 180px; right: 220px;
      bottom: 72px;
      cursor: grab;
      /* 배경 이미지 */
      background-image: url('./bg.jpg');
      background-size: 220% auto;
      background-position: 20% 50%;
      background-repeat: no-repeat;
      animation: nebulaDrift 80s ease-in-out infinite,
                 nebulaBreath 25s ease-in-out infinite;
      will-change: background-position;
    }
    #canvas-wrap:active { cursor: grabbing; }
    #canvas-wrap canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      /* WebGL 캔버스를 투명하게 유지 */
      background: transparent !important;
    }

    /* ── LEFT PANEL ── */
    #left-panel {
      position: fixed;
      top: 42px; left: 0;
      width: 180px;
      bottom: 72px;
      background: rgba(6,5,4,0.92);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      z-index: 50;
    }
    #node-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }
    #node-list::-webkit-scrollbar { width: 2px; }
    #node-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); }

    .node-section { padding: 12px 10px 4px; }
    .node-section-label {
      font-size: 8px;
      letter-spacing: 0.25em;
      color: var(--t3);
      text-transform: uppercase;
      margin-bottom: 6px;
      padding-left: 2px;
    }
    .node-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 8px;
      margin-bottom: 1px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 10px;
      line-height: 1.35;
      color: var(--t2);
      transition: background 0.15s, color 0.15s;
      border-left: 2px solid transparent;
      position: relative;
    }
    .node-item:hover { color: var(--t1); background: rgba(255,255,255,0.04); }
    .node-item.active { color: var(--t1); background: rgba(255,255,255,0.05); }
    .node-item.visited::after {
      content: '';
      position: absolute;
      right: 8px; top: 50%;
      transform: translateY(-50%);
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--t3);
    }
    .node-item[data-mod="logic"]   { border-left-color: var(--logic); }
    .node-item[data-mod="rest"]    { border-left-color: var(--rest); }
    .node-item[data-mod="shadows"] { border-left-color: var(--shadows); }
    .node-item.dimmed {
      opacity: 0.15;
      transition: opacity 0.35s ease;
    }

    .node-dot {
      flex-shrink: 0;
      width: 5px; height: 5px;
      border-radius: 50%;
    }
    .node-text { line-height: 1.3; }

    /* explore counter */
    #explore-counter {
      flex-shrink: 0;
      padding: 10px 12px 12px;
      border-top: 1px solid var(--line);
    }
    #counter-label {
      font-size: 8px;
      color: var(--t3);
      letter-spacing: 0.12em;
      margin-bottom: 5px;
    }
    #counter-bar {
      height: 1px;
      background: rgba(255,255,255,0.07);
      border-radius: 1px;
      overflow: hidden;
    }
    #counter-fill {
      height: 100%;
      background: rgba(200,175,120,0.85);
      width: 0%;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }

    /* ── RIGHT PANEL ── */
    #right-panel {
      position: fixed;
      top: 42px; right: 0;
      width: 220px;
      bottom: 72px;
      background: rgba(6,5,4,0.92);
      border-left: 1px solid var(--line);
      overflow-y: auto;
      z-index: 50;
      transform: translateX(0);
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    #right-panel.hidden { transform: translateX(220px); }
    #right-panel::-webkit-scrollbar { width: 2px; }
    #right-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); }

    #panel-inner { padding: 18px 14px; }
    #panel-close {
      float: right;
      font-size: 9px;
      color: var(--t3);
      cursor: pointer;
      letter-spacing: 0.1em;
      margin-top: -2px;
      background: none;
      border: none;
      color: var(--t3);
      font-family: inherit;
    }
    #panel-close:hover { color: var(--t2); }
    #panel-mod {
      font-size: 8px;
      letter-spacing: 0.25em;
      color: var(--t3);
      text-transform: uppercase;
      margin-bottom: 10px;
      clear: both;
    }
    #panel-title {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 15px;
      line-height: 1.35;
      color: var(--t1);
      margin-bottom: 12px;
    }
    #panel-body {
      font-size: 10.5px;
      line-height: 1.75;
      color: var(--t2);
      margin-bottom: 14px;
    }
    #panel-meta { margin-bottom: 14px; }
    .meta-row {
      display: flex;
      justify-content: space-between;
      font-size: 8.5px;
      color: var(--t3);
      margin-bottom: 3px;
      letter-spacing: 0.05em;
    }
    .meta-key { opacity: 0.7; }

    #panel-rel-wrap { margin-bottom: 14px; }
    .rel-label {
      font-size: 8px;
      letter-spacing: 0.18em;
      color: var(--t3);
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .rel-item {
      font-size: 9.5px;
      color: var(--t2);
      padding: 4px 0;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: color 0.15s;
    }
    .rel-item:hover { color: var(--t1); }
    .rel-arrow { opacity: 0.3; margin-right: 5px; }

    #panel-divider {
      height: 1px;
      background: var(--line);
      margin: 12px 0;
    }
    #panel-mirror {
      font-size: 10.5px;
      line-height: 1.85;
      color: rgba(255,255,255,0.32);
      font-style: italic;
    }

    /* ── BOTTOM NAV ── */
    #bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 46px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 4px;
      background: rgba(6,5,4,0.92);
      border-top: 1px solid var(--line);
      z-index: 100;
    }
    .nav-btn {
      padding: 5px 13px;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--t3);
      background: none;
      border: 1px solid transparent;
      border-radius: 2px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      text-transform: uppercase;
    }
    .nav-btn:hover { color: var(--t2); border-color: rgba(255,255,255,0.08); }
    .nav-btn.active {
      color: var(--t1);
      border-color: rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.04);
    }

    /* ── DWELL BAR ── */
    #dwell-bar {
      position: fixed;
      bottom: 46px;
      left: 180px; right: 220px;
      height: 26px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      background: rgba(6,5,4,0.75);
      border-top: 1px solid rgba(255,255,255,0.03);
      z-index: 90;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
    }
    #dwell-bar.active { opacity: 1; }
    #dwell-name { font-size: 8.5px; color: var(--t2); white-space: nowrap; min-width: 80px; }
    #dwell-progress {
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.07);
      border-radius: 1px;
      overflow: hidden;
    }
    #dwell-fill {
      height: 100%;
      width: 0%;
      background: rgba(200,175,120,0.85);
    }
    #dwell-time { font-size: 8px; color: var(--t3); min-width: 30px; text-align: right; }

    /* ── SVG CONNECTIONS OVERLAY ── */
    #connections-overlay {
      position: fixed;
      top: 42px; left: 180px; right: 220px;
      bottom: 72px;
      pointer-events: none;  /* SVG 배경은 통과, g 요소만 이벤트 받음 */
      z-index: 30;
      overflow: visible;
    }
    #connections-overlay g {
      pointer-events: all;   /* 노드 점은 클릭 가능 */
    }

    /* ── 3D CHIPS ── */
    #chips-layer {
      position: fixed;
      top: 42px; left: 180px; right: 220px;
      bottom: 72px;
      pointer-events: none;
      z-index: 35;
    }
    .node-chip {
      position: absolute;
      transform: translate(-50%, -50%);
      padding: 3px 9px;
      border: 1px solid currentColor;
      border-radius: 2px;
      font-size: 10px;
      letter-spacing: 0.10em;
      cursor: pointer;
      white-space: nowrap;
      background: rgba(6,5,4,0.78);
      backdrop-filter: blur(6px);
      pointer-events: all;
      transition: background 0.2s, transform 0.2s;
      opacity: 0.92;
    }
    .node-chip:hover { background: rgba(6,5,4,0.95); transform: translate(-50%, -50%) scale(1.05); opacity: 1; }

    /* ── SPACE CHIPS (interior) ── */
    .space-chip {
      position: absolute;
      transform: translate(-50%, -50%);
      padding: 2px 7px;
      border: 1px solid currentColor;
      border-radius: 2px;
      font-size: 8px;
      letter-spacing: 0.12em;
      cursor: pointer;
      white-space: nowrap;
      background: rgba(6,5,4,0.65);
      backdrop-filter: blur(4px);
      pointer-events: all;
      transition: background 0.2s;
    }
    .space-chip:hover { background: rgba(6,5,4,0.88); }

    /* ── MIRROR OVERLAY ── */
    #mirror-overlay {
      position: fixed;
      inset: 0;
      background: rgba(6,5,4,0.0);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.2s ease, background 1.2s ease;
    }
    #mirror-overlay.active {
      opacity: 1;
      pointer-events: all;
      background: rgba(6,5,4,0.90);
    }
    #mirror-content { max-width: 460px; text-align: center; padding: 60px 32px; }
    #mirror-label {
      font-size: 8px;
      letter-spacing: 0.3em;
      color: var(--t3);
      text-transform: uppercase;
      margin-bottom: 36px;
    }
    #mirror-text {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 16px;
      line-height: 2.1;
      color: rgba(255,255,255,0.65);
      margin-bottom: 48px;
      white-space: pre-line;
    }
    #mirror-close {
      font-size: 8px;
      letter-spacing: 0.22em;
      color: var(--t3);
      cursor: pointer;
      text-transform: uppercase;
      background: none;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 8px 22px;
      border-radius: 2px;
      font-family: 'DM Mono', monospace;
      transition: color 0.2s, border-color 0.2s;
    }
    #mirror-close:hover { color: var(--t2); border-color: rgba(255,255,255,0.2); }

    /* ── INTRO OVERLAY ── */
    #intro-overlay {
      position: fixed;
      inset: 0;
      background: #060504;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
      transition: opacity 1.5s ease;
    }
    #intro-overlay.fade-out { opacity: 0; pointer-events: none; }
    #intro-name {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 26px;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.65);
      margin-bottom: 10px;
      text-align: center;
    }
    #intro-sub {
      font-size: 9px;
      letter-spacing: 0.4em;
      color: var(--t3);
      text-transform: uppercase;
      text-align: center;
    }
  </style>
</head>
<body>

  <div id="intro-overlay">
    <div>
      <div id="intro-name">Kim Sunbeom</div>
      <div id="intro-sub">Archive</div>
    </div>
  </div>

  <div id="topbar">
    <div id="topbar-title">KIM SUNBEOM ARCHIVE</div>
    <div id="topbar-status">—</div>
  </div>

  <div id="left-panel">
    <div id="node-list"></div>
    <div id="explore-counter">
      <div id="counter-label">탐색 <span id="counter-num">0</span> / 12</div>
      <div id="counter-bar"><div id="counter-fill"></div></div>
    </div>
  </div>

  <div id="canvas-wrap"></div>

  <svg id="connections-overlay" xmlns="http://www.w3.org/2000/svg" overflow="visible"></svg>

  <div id="chips-layer"></div>

  <div id="right-panel" class="hidden">
    <div id="panel-inner">
      <button id="panel-close">✕</button>
      <div id="panel-mod"></div>
      <div id="panel-title"></div>
      <div id="panel-body"></div>
      <div id="panel-meta"></div>
      <div id="panel-rel-wrap"></div>
      <div id="panel-divider"></div>
      <div id="panel-mirror"></div>
    </div>
  </div>

  <div id="dwell-bar">
    <div id="dwell-name"></div>
    <div id="dwell-progress"><div id="dwell-fill"></div></div>
    <div id="dwell-time"></div>
  </div>

  <div id="bottom-nav">
    <button class="nav-btn active" data-view="outside">Outside</button>
    <button class="nav-btn" data-view="living">거실</button>
    <button class="nav-btn" data-view="study">서재</button>
    <button class="nav-btn" data-view="bedroom">침실</button>
  </div>

  <div id="mirror-overlay">
    <div id="mirror-content">
      <div id="mirror-label">당신의 시선 지도</div>
      <div id="mirror-text"></div>
      <button id="mirror-close">닫기</button>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
